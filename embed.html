<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reviews to Growth — Live Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #0a0a0a;
    --off-black: #1a1a1a;
    --dark-gray: #3a3a3a;
    --mid-gray: #6b6b6b;
    --light-gray: #a0a0a0;
    --border-gray: #d4d4d4;
    --pale-gray: #f0f0f0;
    --off-white: #fafafa;
    --white: #ffffff;
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--white);
    color: var(--off-black);
    min-height: 100vh;
    padding: 3rem 1.5rem;
  }

  .page-wrap { max-width: 620px; margin: 0 auto; }

  .brand { display: flex; align-items: center; gap: 14px; margin-bottom: 3rem; }

  .logo-mark {
    width: 42px; height: 42px;
    background: var(--black);
    border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .logo-mark svg { width: 20px; height: 20px; }

  .brand-text .name {
    font-family: 'Playfair Display', serif;
    font-size: 19px;
    color: var(--black);
    line-height: 1.2;
    letter-spacing: -0.01em;
  }

  .brand-text .tagline {
    font-size: 12px;
    color: var(--light-gray);
    margin-top: 3px;
  }

  .divider { height: 1px; background: var(--border-gray); margin-bottom: 2rem; }

  .card {
    background: var(--white);
    border: 1px solid var(--border-gray);
    border-radius: var(--radius-lg);
    padding: 1.75rem;
    margin-bottom: 1rem;
  }

  .section-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--light-gray);
    margin-bottom: 10px;
  }

  .restaurant-badge {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--black);
    border-radius: var(--radius-sm);
    padding: 8px 14px;
    margin-bottom: 1.5rem;
  }

  .badge-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--light-gray);
  }

  .badge-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--white);
  }

  .input-group { display: flex; flex-direction: column; gap: 7px; margin-bottom: 1.5rem; }

  .input-group label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--light-gray);
  }

  .input-group input {
    padding: 11px 13px;
    border: 1px solid var(--border-gray);
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--off-black);
    background: var(--off-white);
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  .input-group input:focus {
    outline: none;
    border-color: var(--black);
    box-shadow: 0 0 0 3px rgba(0,0,0,0.08);
    background: var(--white);
  }

  .input-group input::placeholder { color: var(--border-gray); }

  .star-row { display: flex; gap: 5px; margin-bottom: 1.5rem; }

  .star {
    font-size: 24px;
    cursor: pointer;
    color: var(--border-gray);
    transition: color 0.1s, transform 0.1s;
    line-height: 1;
    user-select: none;
  }

  .star:hover { transform: scale(1.1); }
  .star.lit { color: var(--off-black); }

  .review-textarea {
    width: 100%;
    min-height: 120px;
    padding: 13px;
    border: 1px solid var(--border-gray);
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--off-black);
    background: var(--off-white);
    resize: vertical;
    line-height: 1.65;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  .review-textarea:focus {
    outline: none;
    border-color: var(--black);
    box-shadow: 0 0 0 3px rgba(0,0,0,0.08);
    background: var(--white);
  }

  .review-textarea::placeholder { color: var(--border-gray); }

  .chips { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }

  .chip {
    font-size: 12px;
    padding: 5px 12px;
    border: 1px solid var(--border-gray);
    border-radius: 20px;
    cursor: pointer;
    color: var(--mid-gray);
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
  }

  .chip:hover { border-color: var(--black); color: var(--black); background: var(--pale-gray); }

  .gen-btn {
    width: 100%;
    padding: 15px;
    background: var(--black);
    color: var(--white);
    border: none;
    border-radius: var(--radius-md);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    margin-top: 0.5rem;
    letter-spacing: 0.01em;
  }

  .gen-btn:hover { background: var(--dark-gray); }
  .gen-btn:active { transform: scale(0.99); }
  .gen-btn:disabled { background: var(--light-gray); cursor: not-allowed; transform: none; }

  .response-card {
    background: var(--off-white);
    border: 1px solid var(--border-gray);
    border-radius: var(--radius-lg);
    padding: 1.75rem;
    margin-top: 1rem;
    display: none;
  }

  .response-card.visible { display: block; }

  .resp-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border-gray);
  }

  .resp-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--black); }

  .resp-label {
    font-size: 10px;
    font-weight: 500;
    color: var(--mid-gray);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .resp-meta { font-size: 12px; color: var(--light-gray); margin-left: auto; }

  .resp-body {
    font-size: 15px;
    line-height: 1.85;
    color: var(--off-black);
    white-space: pre-wrap;
    min-height: 30px;
  }

  .typing { display: inline-flex; gap: 5px; align-items: center; padding: 4px 0; }

  .typing span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--mid-gray);
    animation: pulse 1.2s infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse {
    0%, 80%, 100% { transform: scale(0.5); opacity: 0.3; }
    40% { transform: scale(1); opacity: 1; }
  }

  .copy-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 16px;
    padding: 9px 16px;
    border: 1px solid var(--border-gray);
    border-radius: var(--radius-sm);
    background: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--mid-gray);
    cursor: pointer;
    transition: all 0.15s;
  }

  .copy-btn:hover { border-color: var(--black); color: var(--black); }

  .error-box {
    background: var(--pale-gray);
    border: 1px solid var(--border-gray);
    border-left: 3px solid var(--black);
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    font-size: 13px;
    color: var(--dark-gray);
    margin-top: 12px;
    display: none;
    line-height: 1.5;
  }

  .footer {
    text-align: center;
    font-size: 11px;
    color: var(--light-gray);
    margin-top: 2.5rem;
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>
<div class="page-wrap">

  <div class="brand">
    <div class="logo-mark">
      <svg viewBox="0 0 22 22" fill="none">
        <path d="M11 2L13.8 8.2H20.5L15.2 12.1L17.4 18.8L11 15L4.6 18.8L6.8 12.1L1.5 8.2H8.2L11 2Z" fill="white"/>
      </svg>
    </div>
    <div class="brand-text">
      <div class="name">Reviews to Growth</div>
      <div class="tagline">AI-powered review response engine · Live demo</div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="card">

    <div class="restaurant-badge">
      <span class="badge-label">Restaurant</span>
      <span class="badge-name">Ember &amp; Grain</span>
    </div>

    <div class="input-group">
      <label>Reviewer's name</label>
      <input type="text" id="senderName" placeholder="e.g. Priya, Rahul..." />
    </div>

    <div class="section-label">Review rating</div>
    <div class="star-row" id="stars">
      <span class="star lit" data-v="1" onclick="setStars(1)">★</span>
      <span class="star lit" data-v="2" onclick="setStars(2)">★</span>
      <span class="star lit" data-v="3" onclick="setStars(3)">★</span>
      <span class="star lit" data-v="4" onclick="setStars(4)">★</span>
      <span class="star lit" data-v="5" onclick="setStars(5)">★</span>
    </div>

    <div class="section-label">Paste the customer review</div>
    <textarea class="review-textarea" id="reviewInput" placeholder="Paste the Google or Zomato review here..."></textarea>

    <div class="chips">
      <button class="chip" onclick="loadSample('positive')">↑ Positive sample</button>
      <button class="chip" onclick="loadSample('negative')">↓ Negative sample</button>
    </div>
  </div>

  <div class="error-box" id="errorBox"></div>

  <button class="gen-btn" id="genBtn" onclick="generateResponse()">Generate AI Response ↗</button>

  <div class="response-card" id="responseCard">
    <div class="resp-header">
      <div class="resp-dot"></div>
      <div class="resp-label">AI-crafted owner reply</div>
      <div class="resp-meta" id="respMeta"></div>
    </div>
    <div class="resp-body" id="respBody"></div>
    <button class="copy-btn" id="copyBtn" onclick="copyResponse()">↩ Copy response</button>
  </div>

  <div class="footer">Powered by Reviews to Growth · AI review engine for restaurants &amp; cafés</div>

</div>

<script>
  const BACKEND_URL = 'https://your-app-name.onrender.com';

  let selectedStars = 5;

  const samples = {
    positive: {
      stars: 5,
      text: "Absolutely loved this place! The biryani was incredibly flavorful — one of the best I've had in the city. Service was warm and the staff were so attentive. Will definitely be back with family!"
    },
    negative: {
      stars: 2,
      text: "Very disappointed. Waited 45 minutes for our food and it came out cold. The waiter was dismissive when we asked for an update. Expected much better for the price point."
    }
  };

  function setStars(n) {
    selectedStars = n;
    document.querySelectorAll('.star').forEach(s => {
      s.classList.toggle('lit', parseInt(s.dataset.v) <= n);
    });
  }

  function loadSample(type) {
    const s = samples[type];
    document.getElementById('reviewInput').value = s.text;
    setStars(s.stars);
  }

  function showError(msg) {
    const box = document.getElementById('errorBox');
    box.textContent = msg;
    box.style.display = msg ? 'block' : 'none';
  }

  async function generateResponse() {
    const review = document.getElementById('reviewInput').value.trim();
    if (!review) { showError('Please paste a review first.'); return; }

    const senderName = document.getElementById('senderName').value.trim();
    showError('');

    const btn = document.getElementById('genBtn');
    const card = document.getElementById('responseCard');
    const body = document.getElementById('respBody');
    const meta = document.getElementById('respMeta');
    const copyBtn = document.getElementById('copyBtn');

    btn.disabled = true;
    btn.textContent = 'Generating...';
    card.classList.add('visible');
    copyBtn.style.display = 'none';
    body.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
    meta.textContent = '';

    const t0 = Date.now();

    try {
      const res = await fetch(`${BACKEND_URL}/generate`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ review, senderName, stars: selectedStars })
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err?.error || `Server error ${res.status}`);
      }

      const data = await res.json();
      const text = data?.response;
      if (!text) throw new Error('Empty response received.');

      const elapsed = ((Date.now() - t0) / 1000).toFixed(1);
      body.textContent = text;
      meta.textContent = `${elapsed}s · ${text.split(' ').length} words`;
      copyBtn.style.display = 'inline-flex';

    } catch(e) {
      body.innerHTML = '';
      card.classList.remove('visible');
      showError('Error: ' + (e.message || 'Something went wrong. Please try again.'));
    }

    btn.disabled = false;
    btn.textContent = 'Generate AI Response ↗';
  }

  function copyResponse() {
    const text = document.getElementById('respBody').textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.textContent = '✓ Copied!';
      setTimeout(() => btn.textContent = '↩ Copy response', 2000);
    });
  }
</script>
</body>
</html>
